name: Update fund return dashboard

on:
  schedule:
    # GitHub cron is UTC. These are 07:30 and 07:45 KST, Monday-Friday.
    # The second schedule is a small backup because GitHub scheduled runs can be delayed or occasionally dropped.
    - cron: "30 22 * * 0-4"
    - cron: "45 22 * * 0-4"
  workflow_dispatch:
    inputs:
      download_raw:
        description: "Download 펀드 기준가.xlsx before rebuilding"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  push:
    branches:
      - main
    paths:
      - "build_fund_dashboard.py"
      - "download_fund_price.py"
      - "mapping.xlsx"
      - "mapping.csv"
      - "Hana_EMP.xlsx"
      - "펀드 기준가.xlsx"
      - "plotly-2.35.2.min.js"
      - ".github/workflows/update-dashboard.yml"

env:
  TZ: Asia/Seoul

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: fund-return-dashboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Ensure Plotly is available
        run: python -c "from pathlib import Path; from urllib.request import urlretrieve; p=Path('plotly-2.35.2.min.js'); (not p.exists()) and urlretrieve('https://cdn.plot.ly/plotly-2.35.2.min.js', p)"

      - name: Download raw fund price data
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.download_raw == 'true')
        env:
          KFROM_ID: ${{ secrets.KFROM_ID }}
          KFROM_PASSWORD: ${{ secrets.KFROM_PASSWORD }}
        run: python download_fund_price.py

      - name: Restore mapping workbook from CSV
        run: |
          python - <<'PY'
          import csv
          from pathlib import Path
          import openpyxl

          source = Path("mapping.csv")
          if source.exists():
              workbook = openpyxl.Workbook()
              sheet = workbook.active
              sheet.title = "Data"
              with source.open("r", encoding="utf-8-sig", newline="") as file:
                  for row in csv.reader(file):
                      sheet.append(row)
              workbook.save("mapping.xlsx")
          PY

      - name: Patch dashboard builder for unmapped funds
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("build_fund_dashboard.py")
          text = path.read_text(encoding="utf-8")
          if '"unmappedFunds"' not in text:
              text = text.replace(
                  "    all_dates = []\n\n    for row in ws.iter_rows(min_row=4, values_only=True):",
                  "    all_dates = []\n    unmapped = {}\n\n    for row in ws.iter_rows(min_row=4, values_only=True):",
              )
              text = text.replace(
                  "        info = mapping.get(code)\n        if not info:\n            continue\n",
                  "        info = mapping.get(code)\n        if not info:\n            if d and code:\n                item = unmapped.setdefault(code, {\n                    \"latestDate\": \"\", \"type\": \"\", \"code\": code, \"investDate\": \"\",\n                    \"name\": \"\", \"dailyReturn\": None, \"nav\": None, \"cumulativeReturn\": None, \"count\": 0,\n                })\n                if d >= item[\"latestDate\"]:\n                    item.update({\n                        \"latestDate\": d,\n                        \"type\": str(row[2]).strip() if row[2] is not None else \"\",\n                        \"investDate\": as_date_text(row[4]),\n                        \"name\": str(row[5]).strip() if row[5] is not None else \"\",\n                        \"dailyReturn\": as_number(row[6]),\n                        \"nav\": as_number(row[7]),\n                        \"cumulativeReturn\": as_number(row[10]),\n                    })\n                item[\"count\"] += 1\n            continue\n",
              )
              text = text.replace(
                  '        "series": sorted_series,\n    }',
                  '        "series": sorted_series,\n        "unmappedFunds": sorted(unmapped.values(), key=lambda item: (item["latestDate"], item["name"], item["code"]), reverse=True),\n    }',
              )
              path.write_text(text, encoding="utf-8")
          PY

      - name: Build dashboard
        run: python build_fund_dashboard.py

      - name: Patch dashboard HTML behavior
        run: |
          python - <<'PY'
          from pathlib import Path

          files = [Path("docs/index.html"), *Path(".").glob("fund_return_chart(*).html")]
          helper = "function allDataDates(){return [...new Set(Object.values(DATA.series).flatMap(rows=>rows.map(row=>row[0])))].filter(Boolean).sort()}function firstDataDateOnOrAfter(target,end){return allDataDates().find(date=>date>=target&&date<=end)||target}"
          ui_helper = "function setAllFilters(){types.clear();[...new Set(DATA.funds.map(f=>f.type))].sort((a,b)=>(typeOrder.indexOf(a)<0?99:typeOrder.indexOf(a))-(typeOrder.indexOf(b)<0?99:typeOrder.indexOf(b))).forEach(v=>types.add(v));mgrs.clear();[...new Set(DATA.funds.map(f=>f.manager))].sort((a,b)=>a.localeCompare(b,'ko-KR')).forEach(v=>mgrs.add(v))}function installResetAllButton(){if($('resetAll'))return;let b=document.createElement('button');b.id='resetAll';b.type='button';b.textContent='전체 초기화';b.style.cssText='grid-column:1/-1;width:100%;height:38px;padding:0 12px;border:1px solid #c8d1dc;border-radius:6px;background:#fff;color:#334155;font-weight:750;cursor:pointer';let row=document.createElement('div');row.style.cssText='display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin:10px 0 12px';row.appendChild(b);let bm=$('bmBox');bm.insertAdjacentElement('afterend',row);b.onclick=resetAll}function resetAll(){selected.clear();selectedBm.clear();hi.clear();pal=0;showLabels=true;sortKey='periodReturn';sortDir='desc';$('start').value=DATA.dateMin;$('end').value=DATA.dateMax;$('labels').textContent='레이블 숨김';$('chartPanel').classList.remove('collapsed');$('toggleChart').textContent='차트 접기';setAllFilters();renderFilters();renderFunds();$('bmBox').querySelectorAll('input').forEach(i=>i.checked=false);render()}"
          replacements = {
              '<meta name="viewport" content="width=device-width,initial-scale=1">': '<meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">',
              ".table-wrap{max-height:430px;overflow:auto}": ".table-wrap{max-height:430px;overflow:auto}.table-panel.expanded .table-wrap{height:72vh;min-height:620px;max-height:none}",
              '<button id="downloadCsv">CSV</button>': '<button id="downloadCsv">엑셀 다운</button>',
              "$('ytd').onclick=()=>{let y=$('end').value.slice(0,4);$('start').value=Math.max(DATA.dateMin,`${y}-01-01`);render()};": helper + "$('ytd').onclick=()=>{let y=$('end').value.slice(0,4),raw=`${y}-01-01`,target=raw<DATA.dateMin?DATA.dateMin:raw;$('start').value=firstDataDateOnOrAfter(target,$('end').value);render()};",
              "$('mtd').onclick=()=>{$('start').value=$('end').value.slice(0,8)+'01';render()};": "$('mtd').onclick=()=>{let raw=$('end').value.slice(0,8)+'01',target=raw<DATA.dateMin?DATA.dateMin:raw;$('start').value=firstDataDateOnOrAfter(target,$('end').value);render()};",
              "<td>${pct(m.tr.ytd)}</td><td>${pct(m.tr.mtd)}</td><td>${pct(m.tr.d1)}</td><td>${pct(m.tr.w1)}</td><td>${pct(m.tr.m1)}</td><td>${pct(m.tr.m3)}</td><td>${pct(m.tr.m6)}</td><td>${pct(m.tr.y1)}</td>": "<td class=\"${cls(m.tr.ytd)}\">${pct(m.tr.ytd)}</td><td class=\"${cls(m.tr.mtd)}\">${pct(m.tr.mtd)}</td><td class=\"${cls(m.tr.d1)}\">${pct(m.tr.d1)}</td><td class=\"${cls(m.tr.w1)}\">${pct(m.tr.w1)}</td><td class=\"${cls(m.tr.m1)}\">${pct(m.tr.m1)}</td><td class=\"${cls(m.tr.m3)}\">${pct(m.tr.m3)}</td><td class=\"${cls(m.tr.m6)}\">${pct(m.tr.m6)}</td><td class=\"${cls(m.tr.y1)}\">${pct(m.tr.y1)}</td>",
              "const fundPal=[['#0f766e','#f97316','#84cc16','#ec4899','#06b6d4','#f59e0b','#2563eb','#9333ea'],['#0891b2','#ea580c','#16a34a','#db2777','#ca8a04','#0d9488','#1d4ed8','#7c3aed']];const bmPal=[{BM_KOSPI:'#111827',BM_KOSDAQ:'#b91c1c',BM_SPX:'#2563eb',BM_NASDAQ:'#7c3aed'},{BM_KOSPI:'#0f766e',BM_KOSDAQ:'#dc2626',BM_SPX:'#1d4ed8',BM_NASDAQ:'#c026d3'}];": "const fundPal=[['#2563eb','#dc2626','#059669','#d97706','#7c3aed','#0891b2','#be185d','#4d7c0f','#9333ea','#b45309','#0f766e','#e11d48'],['#111827','#f97316','#14b8a6','#c026d3','#84cc16','#ef4444','#0284c7','#a16207','#16a34a','#db2777','#4338ca','#65a30d'],['#0f766e','#e11d48','#1d4ed8','#ca8a04','#9333ea','#15803d','#ea580c','#0e7490','#be123c','#4f46e5','#854d0e','#047857']];",
              "let c=f.isBm?bmPal[pal][f.id]:fundPal[pal][(fundIdx<0?i:fundIdx)%fundPal[pal].length];": "let c=fundPal[pal][i%fundPal[pal].length];",
              "let selected=new Set(),selectedBm=new Set(),types=new Set(),mgrs=new Set(),hi=new Set(),pal=0,showLabels=false,sortKey='periodReturn',sortDir='desc',models=[];": "let selected=new Set(),selectedBm=new Set(),types=new Set(),mgrs=new Set(),hi=new Set(),pal=0,showLabels=true,sortKey='periodReturn',sortDir='desc',models=[];",
              "function init(){ $('start').value=DATA.dateMin;": ui_helper + "function init(){installResetAllButton();setAllFilters();$('labels').textContent='레이블 숨김';$('start').value=DATA.dateMin;",
              "function renderFilter(menu,set,values,btn){menu.innerHTML=`<label><input type=\"checkbox\" data-all=\"1\" ${set.size===0?'checked':''}>전체</label>`+values.map(v=>`<label><input type=\"checkbox\" value=\"${esc(v)}\" ${set.has(v)?'checked':''}>${esc(v)}</label>`).join('');btn.textContent=set.size?`${set.size}개 선택`:'전체';menu.querySelectorAll('input').forEach(i=>i.onchange=()=>{if(i.dataset.all){set.clear()}else{i.checked?set.add(i.value):set.delete(i.value)}renderFilters();renderFunds();render()})}": "function renderFilter(menu,set,values,btn){let visible=new Set([...set].filter(v=>values.includes(v))),all=values.length>0&&visible.size===values.length;menu.innerHTML=`<label><input type=\"checkbox\" data-all=\"1\" ${all?'checked':''}>전체</label>`+values.map(v=>`<label><input type=\"checkbox\" value=\"${esc(v)}\" ${(all||visible.has(v))?'checked':''}>${esc(v)}</label>`).join('');btn.textContent=all?'전체':visible.size?`${visible.size}개 선택`:'선택 없음';menu.querySelectorAll('input').forEach(i=>i.onchange=()=>{if(i.dataset.all){if(all)values.forEach(v=>set.delete(v));else values.forEach(v=>set.add(v))}else{i.checked?set.add(i.value):set.delete(i.value)}renderFilters();renderFunds();render()})}",
              "function filteredFunds(){return DATA.funds.filter(f=>(!types.size||types.has(f.type))&&(!mgrs.size||mgrs.has(f.manager)))}": "function filteredFunds(){return DATA.funds.filter(f=>types.has(f.type)&&mgrs.has(f.manager))}",
              "renderFilters();renderFunds();render()}": "renderFilters();renderFunds();renderUnmapped();startAutoRefreshCheck();render()}",
          }

          unmapped_html = "</section><details class=\"panel table-panel\"><summary class=\"table-head\"><div><h2>미등록 펀드</h2><div class=\"title-note\" id=\"unmappedHint\"></div></div></summary><div class=\"table-wrap\"><table><thead><tr><th>최근 기준일</th><th>유형</th><th>예탁원펀드코드</th><th>투자일</th><th>펀드명</th><th>일수익률</th><th>기준가</th><th>누적수익률</th><th>관측치</th></tr></thead><tbody id=\"unmappedBody\"></tbody></table></div></details>"
          extra_js = "function xmlEscape(v){return String(v??'').replace(/[<>&\"']/g,ch=>({'<':'&lt;','>':'&gt;','&':'&amp;','\"':'&quot;',\"'\":'&apos;'}[ch]))}function excelXml(sheet,header,rows){let table=[header,...rows].map(r=>`<Row>${r.map(v=>`<Cell><Data ss:Type=\"String\">${xmlEscape(v)}</Data></Cell>`).join('')}</Row>`).join('');return `<?xml version=\"1.0\" encoding=\"UTF-8\"?><?mso-application progid=\"Excel.Sheet\"?><Workbook xmlns=\"urn:schemas-microsoft-com:office:spreadsheet\" xmlns:ss=\"urn:schemas-microsoft-com:office:spreadsheet\"><Worksheet ss:Name=\"${xmlEscape(sheet)}\"><Table>${table}</Table></Worksheet></Workbook>`}function renderUnmapped(){let body=$('unmappedBody'),hint=$('unmappedHint'),rows=DATA.unmappedFunds||[];if(!body||!hint)return;hint.textContent=rows.length?`${rows.length.toLocaleString('ko-KR')}개 · mapping.xlsx 미등록`:'미등록 펀드 없음';body.innerHTML=rows.length?rows.map(x=>`<tr><td>${esc(x.latestDate||'')}</td><td>${esc(x.type||'')}</td><td>${esc(x.code||'')}</td><td>${esc(x.investDate||'')}</td><td>${esc(x.name||'')}</td><td class=\"${cls(x.dailyReturn)}\">${pp(x.dailyReturn)}</td><td>${x.nav==null?'-':Number(x.nav).toLocaleString('ko-KR',{minimumFractionDigits:2,maximumFractionDigits:2})}</td><td class=\"${cls(x.cumulativeReturn)}\">${pp(x.cumulativeReturn)}</td><td>${(x.count||0).toLocaleString('ko-KR')}</td></tr>`).join(''):`<tr><td colspan=\"9\" class=\"empty\">mapping.xlsx에 미등록된 펀드가 없습니다.</td></tr>`}function startAutoRefreshCheck(){if(!/^https?:/.test(location.protocol))return;let current=DATA.generatedAt;let check=()=>{fetch(location.href.split('#')[0]+(location.href.includes('?')?'&':'?')+'_='+Date.now(),{cache:'no-store'}).then(r=>r.ok?r.text():'').then(t=>{let m='\"generatedAt\":\"',i=t.indexOf(m);if(i<0)return;let latest=t.slice(i+m.length).split('\\\"')[0];if(latest&&latest!==current)location.reload()}).catch(()=>{})};setInterval(check,300000);document.addEventListener('visibilitychange',()=>{if(!document.hidden)check()})}"

          for path in files:
              if not path.exists():
                  continue
              html = path.read_text(encoding="utf-8")
              original = html
              for old, new in replacements.items():
                  html = html.replace(old, new)
              if 'id="unmappedBody"' not in html:
                  html = html.replace('</section></div></div></main>', unmapped_html + '</div></div></main>')
              if 'function renderUnmapped()' not in html:
                  start = html.find('function downloadCsv(){')
                  end = html.find('init();', start)
                  if start >= 0 and end >= 0:
                      new_download = "function downloadCsv(){let header=cols.map(c=>c[1]);let rows=[...document.querySelectorAll('#perfBody tr')].map(tr=>[...tr.children].map(td=>td.textContent));let xml=excelXml('성과지표',header,rows);let a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\\ufeff'+xml],{type:'application/vnd.ms-excel;charset=utf-8'}));a.download='performance_metrics.xls';a.click()}"
                      html = html[:start] + extra_js + new_download + html[end:]
              if html != original:
                  path.write_text(html, encoding="utf-8")
          PY

      - name: Commit updated dashboard files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "펀드 기준가.xlsx" "docs/index.html" "plotly-2.35.2.min.js" || true
          git add fund_return_chart\(*.html || true
          git diff --cached --quiet || git commit -m "Update fund return dashboard"
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-debug-files
          if-no-files-found: ignore
          path: |
            kfroms_debug.*
            *.log
