name: Update fund return dashboard

on:
  schedule:
    # 07:30 KST, Monday-Friday. GitHub schedules use UTC.
    - cron: "30 22 * * 0-4"
  workflow_dispatch:
    inputs:
      download_raw:
        description: "Download 펀드 기준가.xlsx before rebuilding"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  push:
    branches:
      - main
    paths:
      - "build_fund_dashboard.py"
      - "download_fund_price.py"
      - "mapping.xlsx"
      - "mapping.csv"
      - "Hana_EMP.xlsx"
      - "펀드 기준가.xlsx"
      - "plotly-2.35.2.min.js"
      - ".github/workflows/update-dashboard.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: fund-return-dashboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Ensure Plotly is available
        run: python -c "from pathlib import Path; from urllib.request import urlretrieve; p=Path('plotly-2.35.2.min.js'); (not p.exists()) and urlretrieve('https://cdn.plot.ly/plotly-2.35.2.min.js', p)"

      - name: Download raw fund price data
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.download_raw == 'true')
        env:
          KFROM_ID: ${{ secrets.KFROM_ID }}
          KFROM_PASSWORD: ${{ secrets.KFROM_PASSWORD }}
        run: python download_fund_price.py

      - name: Restore mapping workbook from CSV
        run: |
          python - <<'PY'
          import csv
          from pathlib import Path
          import openpyxl

          source = Path("mapping.csv")
          if source.exists():
              workbook = openpyxl.Workbook()
              sheet = workbook.active
              sheet.title = "Data"
              with source.open("r", encoding="utf-8-sig", newline="") as file:
                  for row in csv.reader(file):
                      sheet.append(row)
              workbook.save("mapping.xlsx")
          PY

      - name: Build dashboard
        run: python build_fund_dashboard.py

      - name: Patch dashboard HTML behavior
        run: |
          python - <<'PY'
          from pathlib import Path

          files = [Path("docs/index.html"), *Path(".").glob("fund_return_chart(*).html")]
          helper = "function allDataDates(){return [...new Set(Object.values(DATA.series).flatMap(rows=>rows.map(row=>row[0])))].filter(Boolean).sort()}function firstDataDateOnOrAfter(target,end){return allDataDates().find(date=>date>=target&&date<=end)||target}"
          ui_helper = "function setAllFilters(){types.clear();[...new Set(DATA.funds.map(f=>f.type))].sort((a,b)=>(typeOrder.indexOf(a)<0?99:typeOrder.indexOf(a))-(typeOrder.indexOf(b)<0?99:typeOrder.indexOf(b))).forEach(v=>types.add(v));mgrs.clear();[...new Set(DATA.funds.map(f=>f.manager))].sort((a,b)=>a.localeCompare(b,'ko-KR')).forEach(v=>mgrs.add(v))}function installResetAllButton(){if($('resetAll'))return;let b=document.createElement('button');b.id='resetAll';b.type='button';b.textContent='전체 초기화';b.style.cssText='position:absolute;right:32px;top:26px;height:34px;padding:0 12px;border:1px solid #c8d1dc;border-radius:6px;background:#fff;color:#334155;font-weight:750;cursor:pointer';let h=document.querySelector('header');h.style.position='relative';h.appendChild(b);b.onclick=resetAll}function resetAll(){selected.clear();selectedBm.clear();hi.clear();pal=0;showLabels=true;sortKey='periodReturn';sortDir='desc';$('start').value=DATA.dateMin;$('end').value=DATA.dateMax;$('labels').textContent='레이블 숨김';$('chartPanel').classList.remove('collapsed');$('toggleChart').textContent='차트 접기';setAllFilters();renderFilters();renderFunds();$('bmBox').querySelectorAll('input').forEach(i=>i.checked=false);render()}"
          replacements = {
              "$('ytd').onclick=()=>{let y=$('end').value.slice(0,4);$('start').value=Math.max(DATA.dateMin,`${y}-01-01`);render()};":
                  helper + "$('ytd').onclick=()=>{let y=$('end').value.slice(0,4),raw=`${y}-01-01`,target=raw<DATA.dateMin?DATA.dateMin:raw;$('start').value=firstDataDateOnOrAfter(target,$('end').value);render()};",
              "$('mtd').onclick=()=>{$('start').value=$('end').value.slice(0,8)+'01';render()};":
                  "$('mtd').onclick=()=>{let raw=$('end').value.slice(0,8)+'01',target=raw<DATA.dateMin?DATA.dateMin:raw;$('start').value=firstDataDateOnOrAfter(target,$('end').value);render()};",
              "<td>${pct(m.tr.ytd)}</td><td>${pct(m.tr.mtd)}</td><td>${pct(m.tr.d1)}</td><td>${pct(m.tr.w1)}</td><td>${pct(m.tr.m1)}</td><td>${pct(m.tr.m3)}</td><td>${pct(m.tr.m6)}</td><td>${pct(m.tr.y1)}</td>":
                  "<td class=\"${cls(m.tr.ytd)}\">${pct(m.tr.ytd)}</td><td class=\"${cls(m.tr.mtd)}\">${pct(m.tr.mtd)}</td><td class=\"${cls(m.tr.d1)}\">${pct(m.tr.d1)}</td><td class=\"${cls(m.tr.w1)}\">${pct(m.tr.w1)}</td><td class=\"${cls(m.tr.m1)}\">${pct(m.tr.m1)}</td><td class=\"${cls(m.tr.m3)}\">${pct(m.tr.m3)}</td><td class=\"${cls(m.tr.m6)}\">${pct(m.tr.m6)}</td><td class=\"${cls(m.tr.y1)}\">${pct(m.tr.y1)}</td>",
              "let selected=new Set(),selectedBm=new Set(),types=new Set(),mgrs=new Set(),hi=new Set(),pal=0,showLabels=false,sortKey='periodReturn',sortDir='desc',models=[];":
                  "let selected=new Set(),selectedBm=new Set(),types=new Set(),mgrs=new Set(),hi=new Set(),pal=0,showLabels=true,sortKey='periodReturn',sortDir='desc',models=[];",
              "function init(){ $('start').value=DATA.dateMin;":
                  ui_helper + "function init(){installResetAllButton();setAllFilters();$('labels').textContent='레이블 숨김';$('start').value=DATA.dateMin;",
              "function renderFilter(menu,set,values,btn){menu.innerHTML=`<label><input type=\"checkbox\" data-all=\"1\" ${set.size===0?'checked':''}>전체</label>`+values.map(v=>`<label><input type=\"checkbox\" value=\"${esc(v)}\" ${set.has(v)?'checked':''}>${esc(v)}</label>`).join('');btn.textContent=set.size?`${set.size}개 선택`:'전체';menu.querySelectorAll('input').forEach(i=>i.onchange=()=>{if(i.dataset.all){set.clear()}else{i.checked?set.add(i.value):set.delete(i.value)}renderFilters();renderFunds();render()})}":
                  "function renderFilter(menu,set,values,btn){let visible=new Set([...set].filter(v=>values.includes(v))),all=values.length>0&&visible.size===values.length;menu.innerHTML=`<label><input type=\"checkbox\" data-all=\"1\" ${all?'checked':''}>전체</label>`+values.map(v=>`<label><input type=\"checkbox\" value=\"${esc(v)}\" ${(all||visible.has(v))?'checked':''}>${esc(v)}</label>`).join('');btn.textContent=all?'전체':visible.size?`${visible.size}개 선택`:'선택 없음';menu.querySelectorAll('input').forEach(i=>i.onchange=()=>{if(i.dataset.all){if(all)values.forEach(v=>set.delete(v));else values.forEach(v=>set.add(v))}else{i.checked?set.add(i.value):set.delete(i.value)}renderFilters();renderFunds();render()})}",
              "function filteredFunds(){return DATA.funds.filter(f=>(!types.size||types.has(f.type))&&(!mgrs.size||mgrs.has(f.manager)))}":
                  "function filteredFunds(){return DATA.funds.filter(f=>types.has(f.type)&&mgrs.has(f.manager))}",
          }

          for path in files:
              if not path.exists():
                  continue
              html = path.read_text(encoding="utf-8")
              original = html
              for old, new in replacements.items():
                  html = html.replace(old, new)
              if html != original:
                  path.write_text(html, encoding="utf-8")
          PY

      - name: Commit updated dashboard files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "펀드 기준가.xlsx" "docs/index.html" "plotly-2.35.2.min.js" || true
          git add fund_return_chart\(*.html || true
          git diff --cached --quiet || git commit -m "Update fund return dashboard"
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-debug-files
          if-no-files-found: ignore
          path: |
            kfroms_debug.*
            *.log
